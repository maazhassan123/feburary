<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Valentine's Day</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:    #C1456A;
    --rose-lt: #F4C0D1;
    --rose-bg: #FBEAF0;
    --cream:   #FFF8F2;
    --gold:    #B87C4C;
    --text:    #3A1A26;
    --muted:   #8C5A6A;
  }

  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 2rem 1rem;
  }

  /* ── floating hearts background ── */
  .hearts-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .h {
    position: absolute;
    bottom: -60px;
    font-size: 1.4rem;
    opacity: 0;
    animation: float-up linear infinite;
  }
  .h:nth-child(1)  { left:  5%; animation-duration: 9s;  animation-delay: 0s;   font-size: 1.0rem; }
  .h:nth-child(2)  { left: 15%; animation-duration: 12s; animation-delay: 2s;   font-size: 1.6rem; }
  .h:nth-child(3)  { left: 25%; animation-duration: 8s;  animation-delay: 5s;   font-size: 1.1rem; }
  .h:nth-child(4)  { left: 38%; animation-duration: 14s; animation-delay: 1s;   font-size: 2.0rem; }
  .h:nth-child(5)  { left: 50%; animation-duration: 10s; animation-delay: 3s;   font-size: 0.9rem; }
  .h:nth-child(6)  { left: 62%; animation-duration: 11s; animation-delay: 7s;   font-size: 1.3rem; }
  .h:nth-child(7)  { left: 72%; animation-duration: 7s;  animation-delay: 0.5s; font-size: 1.8rem; }
  .h:nth-child(8)  { left: 83%; animation-duration: 13s; animation-delay: 4s;   font-size: 1.0rem; }
  .h:nth-child(9)  { left: 92%; animation-duration: 9s;  animation-delay: 6s;   font-size: 1.5rem; }
  .h:nth-child(10) { left: 45%; animation-duration: 15s; animation-delay: 8s;   font-size: 2.2rem; }

  @keyframes float-up {
    0%   { transform: translateY(0) rotate(-10deg); opacity: 0; }
    10%  { opacity: 0.55; }
    90%  { opacity: 0.35; }
    100% { transform: translateY(-110vh) rotate(15deg); opacity: 0; }
  }

  /* ── card ── */
  .card {
    position: relative;
    z-index: 1;
    background: #fff;
    border: 1.5px solid var(--rose-lt);
    border-radius: 24px;
    padding: 3rem 3.5rem 2.5rem;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 48px rgba(193,69,106,0.10);
    animation: card-in 0.9s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(32px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  /* decorative lines */
  .card::before, .card::after {
    content: '';
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rose-lt), transparent);
    margin: 0 auto;
    width: 60%;
  }
  .card::before { margin-bottom: 1.8rem; }
  .card::after  { margin-top: 2rem; }

  /* big heart */
  .heart-icon {
    display: block;
    font-size: 3.6rem;
    line-height: 1;
    margin: 0 auto 1.2rem;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.12); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--rose);
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-style: italic;
    font-family: 'Playfair Display', serif;
    color: var(--muted);
    font-size: 1.0rem;
    margin-bottom: 1.6rem;
  }

  p.message {
    font-size: 0.96rem;
    color: #5A3040;
    line-height: 1.8;
    margin-bottom: 2rem;
  }

  /* ── button group ── */
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border: none;
    border-radius: 50px;
    padding: 0.85rem 2rem;
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 0.6px;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--rose);
    color: #fff;
  }
  .btn-primary:hover {
    background: #A83058;
    box-shadow: 0 6px 24px rgba(193,69,106,0.35);
    transform: translateY(-2px);
  }

  .btn-outline {
    background: transparent;
    color: var(--rose);
    border: 1.5px solid var(--rose-lt);
  }
  .btn-outline:hover {
    background: var(--rose-bg);
    border-color: var(--rose);
    transform: translateY(-2px);
  }

  .btn-gold {
    background: transparent;
    color: var(--gold);
    border: 1.5px solid #E2C9A8;
  }
  .btn-gold:hover {
    background: #FDF3E8;
    border-color: var(--gold);
    transform: translateY(-2px);
  }

  /* icon inside buttons */
  .btn .ico { font-size: 1rem; }

  /* ── toast ── */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--rose);
    color: #fff;
    padding: 0.75rem 1.8rem;
    border-radius: 50px;
    font-size: 0.9rem;
    letter-spacing: 0.3px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 99;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── response area ── */
  #response-box {
    margin-top: 1.4rem;
    display: none;
    background: var(--rose-bg);
    border: 1px solid var(--rose-lt);
    border-radius: 14px;
    padding: 1rem 1.4rem;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--rose);
    font-size: 1.0rem;
    line-height: 1.7;
    animation: fade-in 0.5s ease both;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* footer */
  .footer {
    position: relative;
    z-index: 1;
    margin-top: 1.6rem;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .card { padding: 2rem 1.5rem 2rem; }
    h1 { font-size: 1.75rem; }
  }
</style>
</head>
<body>

<!-- floating hearts -->
<div class="hearts-bg">
  <span class="h">♥</span><span class="h">♡</span><span class="h">♥</span>
  <span class="h">♡</span><span class="h">♥</span><span class="h">♡</span>
  <span class="h">♥</span><span class="h">♡</span><span class="h">♥</span>
  <span class="h">♡</span>
</div>

<!-- card -->
<div class="card">
  <span class="heart-icon">♥</span>

  <h1>Happy Valentine's Day</h1>
  <p class="subtitle">— a little note, just for you —</p>

  <p class="message">
    Every day beside you feels like the warmest chapter of the best story ever written.
    Thank you for being the reason I smile, even on ordinary Tuesdays.
  </p>

  <div class="btn-group">
    <button class="btn btn-primary" onclick="showMsg('💌 Sending all my love your way... xoxo')">
      <span class="ico">♥</span> Send My Love
    </button>
    <button class="btn btn-outline" onclick="showQuote()">
      <span class="ico">✦</span> A Romantic Quote
    </button>
    <button class="btn btn-outline" onclick="showMsg('🌹 Roses are on their way... virtually!')">
      <span class="ico">❀</span> Send Roses
    </button>
    <button class="btn btn-gold" onclick="makeWish()">
      <span class="ico">★</span> Make a Wish
    </button>
  </div>

  <div id="response-box"></div>
</div>

<p class="footer">Made with ♥ for Valentine's Day</p>

<div id="toast"></div>

<script>
  const quotes = [
    "\"I have waited for this opportunity for more than half a century, to repeat to you once again my vow of eternal fidelity and everlasting love.\" — Gabriel García Márquez",
    "\"Whatever our souls are made of, yours and mine are the same.\" — Emily Brontë",
    "\"I am yours, don't give myself back to me.\" — Rumi",
    "\"You are my sun, my moon, and all my stars.\" — E.E. Cummings",
    "\"In all the world, there is no heart for me like yours.\" — Maya Angelou"
  ];

  const wishes = [
    "May this year bring you a love that feels like coming home every single day. ✨",
    "Wishing you a heart full of joy and a Valentine's Day as beautiful as you are. 🌹",
    "May every day feel as magical as today does, surrounded by love. 💫",
    "Here's to adventures, laughter, and a lifetime of beautiful moments together. 🌟"
  ];

  function showBox(html) {
    const box = document.getElementById('response-box');
    box.style.display = 'block';
    box.style.animation = 'none';
    void box.offsetWidth;
    box.style.animation = 'fade-in 0.5s ease both';
    box.innerHTML = html;
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function showMsg(msg) {
    toast(msg);
  }

  function showQuote() {
    const q = quotes[Math.floor(Math.random() * quotes.length)];
    showBox(q);
  }

  function makeWish() {
    const w = wishes[Math.floor(Math.random() * wishes.length)];
    showBox(w);
    toast('Your wish has been sent to the stars ★');
  }
</script>
</body>
</html>
