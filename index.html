<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will You Be My Valentine?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fff0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .heart-float {
      position: absolute;
      opacity: 0.2;
      animation: floatUp 8s linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.2; }
      100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 3rem 2rem;
      gap: 1.5rem;
    }

    .bear {
      font-size: 80px;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    .question {
      font-size: 32px;
      font-weight: 600;
      color: #c2185b;
    }

    .sub-text {
      font-size: 16px;
      color: #e91e8c;
      min-height: 26px;
      transition: all 0.3s ease;
    }

    .btns {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }

    #yesBtn {
      background: #e91e8c;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 0.75rem 2rem;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: font-size 0.4s, padding 0.4s, transform 0.2s;
      font-family: inherit;
      box-shadow: 0 4px 15px rgba(233, 30, 140, 0.4);
    }

    #yesBtn:hover { transform: scale(1.05); }

    #noBtn {
      background: white;
      color: #999;
      border: 1px solid #ddd;
      border-radius: 50px;
      padding: 0.75rem 2rem;
      font-size: 18px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    #noBtn:hover { background: #f5f5f5; }

    .result {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .result-msg {
      font-size: 36px;
      font-weight: 700;
      color: #c2185b;
    }

    .result-sub {
      font-size: 18px;
      color: #e91e8c;
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>

  <div id="app">
    <div class="bear">🐻</div>
    <div class="question">Will you be my Valentine?</div>
    <div class="sub-text" id="subText"></div>
    <div class="btns">
      <button id="yesBtn" onclick="pressYes()">Yes 💖</button>
      <button id="noBtn" onclick="pressNo()">No</button>
    </div>
  </div>

  <script>
    let noCount = 0;
    let yesFontSize = 18;
    let yesPadV = 0.75;
    let yesPadH = 2;
    let moving = false;

    const messages = [
      "",
      "Are you sure...? 🥺",
      "Really really sure? 💔",
      "Last chance... 🐻",
      "You can't escape! 😂"
    ];

    // Floating hearts background
    const heartsBg = document.getElementById('heartsBg');
    const emojis = ['❤️', '🩷', '💕', '💗', '💓', '🌹'];
    for (let i = 0; i < 15; i++) {
      const h = document.createElement('div');
      h.className = 'heart-float';
      h.textContent = emojis[i % emojis.length];
      h.style.left = (Math.random() * 100) + '%';
      h.style.fontSize = (14 + Math.random() * 16) + 'px';
      h.style.animationDelay = (Math.random() * 8) + 's';
      h.style.animationDuration = (6 + Math.random() * 6) + 's';
      heartsBg.appendChild(h);
    }

    function pressNo() {
      if (moving) return;
      noCount++;

      const subText = document.getElementById('subText');
      const yesBtn  = document.getElementById('yesBtn');
      const noBtn   = document.getElementById('noBtn');

      subText.textContent = messages[Math.min(noCount, messages.length - 1)];

      if (noCount <= 3) {
        yesFontSize += 6;
        yesPadV     += 0.2;
        yesPadH     += 0.5;
        yesBtn.style.fontSize = yesFontSize + 'px';
        yesBtn.style.padding  = yesPadV + 'rem ' + yesPadH + 'rem';
      }

      if (noCount >= 4) {
        moving = true;
        noBtn.style.position = 'fixed';
        noBtn.style.transition = 'none';
        noBtn.style.zIndex = '999';
        runAway(noBtn);
      }
    }

    function runAway(btn) {
      if (!moving) return;
      const maxX = window.innerWidth  - btn.offsetWidth  - 20;
      const maxY = window.innerHeight - btn.offsetHeight - 20;
      btn.style.left = Math.max(10, Math.floor(Math.random() * maxX)) + 'px';
      btn.style.top  = Math.max(10, Math.floor(Math.random() * maxY)) + 'px';
      setTimeout(() => runAway(btn), 600);
    }

    function pressYes() {
      moving = false;
      document.getElementById('noBtn').style.display = 'none';
      document.getElementById('app').innerHTML = `
        <div class="result">
          <div style="font-size:90px; animation: bounce 1.5s ease-in-out infinite;">🥰</div>
          <div class="result-msg">Yes, I was sure!</div>
          <div class="result-sub">You just made this bear the happiest bear alive 🐻❤️</div>
        </div>
      `;
    }
  </script>
</body>
</html>
